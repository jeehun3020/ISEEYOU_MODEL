seed: 42
paths:
  video_manifest_path: data/manifests_protocol_youtube/video_manifest.csv
  eval_dir: outputs/eval
  protocol_report_dir: outputs/protocol
  checkpoints_dir: outputs/checkpoints_protocol_nodrop
task:
  mode: binary
  classes:
  - real
  - generated
  positive_classes:
  - generated
datasets:
  youtube_mega_real_main:
    enabled: true
    parser: youtube_shorts
    root: data/raw/youtube_real_mega_20260331/real
    class_name: real
    platform_id: youtube
    source_family: youtube_shorts
    upload_pipeline: youtube_native
    split_role: main
  youtube_mega_generated_main:
    enabled: true
    parser: youtube_shorts
    root: data/raw/youtube_generated_mega_20260331/generated
    class_name: generated
    platform_id: youtube
    source_family: youtube_shorts
    upload_pipeline: youtube_native
    split_role: main
  youtube_stress_real_known:
    enabled: true
    parser: youtube_shorts
    root: data/raw/youtube_shorts_real_hardnegative/real
    class_name: real
    platform_id: youtube
    source_family: youtube_shorts
    upload_pipeline: youtube_native
    split_role: stress_real
  youtube_stress_real_query:
    enabled: true
    parser: youtube_shorts
    root: data/raw/youtube_shorts_real_hardnegative_query/real
    class_name: real
    platform_id: youtube
    source_family: youtube_shorts
    upload_pipeline: youtube_native
    split_role: stress_real
  youtube_stress_generated_hardcase:
    enabled: true
    parser: youtube_shorts
    root: data/raw/youtube_shorts_hardcase/hardcase
    class_name: generated
    platform_id: youtube
    source_family: youtube_shorts
    upload_pipeline: youtube_native
    split_role: stress_generated
  youtube_stress_generated_hardcase_extra:
    enabled: true
    parser: youtube_shorts
    root: data/raw/youtube_shorts_hardcase_extra/hardcase
    class_name: generated
    platform_id: youtube
    source_family: youtube_shorts
    upload_pipeline: youtube_native
    split_role: stress_generated
split:
  val_ratio: 0.15
  test_ratio: 0.15
  group_priority:
  - creator_account+raw_asset_group+generator_family+upload_pipeline
  - source_id
  - original_id
  - identity_id
  - video_id
preprocess:
  image_size: 224
  max_frames_per_video: 6
  frame_sampling_mode: anchor
  view_mode: full_frame
  fallback_to_full_frame: true
  text_mask:
    enabled: true
    top_ratio: 0.08
    bottom_ratio: 0.18
    left_ratio: 0.0
    right_ratio: 0.0
    position_mode: fixed
    fill_mode: median
  detector:
    name: none
    device: cpu
protocol:
  sampled_frames: 6
  low_res_shorter_edge: 480
  overlay_text_ratio: 0.03
  high_text_quantile: 0.67
  low_text_quantile: 0.33
  high_motion_quantile: 0.67
  low_motion_quantile: 0.33
  leakage_warning:
    auc_threshold: 0.65
    accuracy_threshold: 0.65
training:
  device: cpu
  batch_size: 16
  num_workers: 0
  epochs: 2
  amp: false
  augmentation:
    region_dropout:
      enabled: false
      p: 0.5
      mode: random_box
      fill_mode: median
      area_ratio_range:
      - 0.08
      - 0.2
      aspect_ratio_range:
      - 0.75
      - 1.5
      fallback_to_random_box: true
