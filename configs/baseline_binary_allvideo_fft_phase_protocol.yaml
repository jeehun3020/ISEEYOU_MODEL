seed: 42
paths:
  processed_faces_dir: data/processed/faces_allvideo_binary_textmask_protocol
  manifests_dir: data/manifests_allvideo_binary_textmask_protocol
  checkpoints_dir: outputs/checkpoints_allvideo_binary_fft_phase_protocol
  eval_dir: outputs/eval
  inference_dir: outputs/inference
task:
  mode: binary
  classes: [real, generated]
  positive_classes: [generated]
datasets:
  ucf101:
    enabled: true
    parser: ucf101
    root: UCF101-Action Recognition
    class_name: real
    max_samples: 2500
    platform_id: ucf101
    creator_account: ucf101
  youtube_shorts_real:
    enabled: true
    parser: youtube_shorts
    root: data/raw/youtube_shorts_binary/real
    class_name: real
    platform_id: youtube
  youtube_shorts_generated:
    enabled: true
    parser: youtube_shorts
    root: data/raw/youtube_shorts_binary/generated
    class_name: generated
    platform_id: youtube
    generator_family: youtube_native
  genimage_local:
    enabled: true
    parser: generic
    root: /Users/jeongjihoon/Desktop/Capstone/gen_img
    media_type: image
    class_name: generated
    platform_id: genimage
    creator_account: genimage
    generator_family: genimage
split:
  val_ratio: 0.15
  test_ratio: 0.15
  group_priority: [creator_account, generator_family, source_id, original_id, identity_id, video_id]
preprocess:
  target_fps: 1
  max_frames_per_video: 6
  image_size: 224
  view_mode: full_frame
  fallback_to_full_frame: true
  text_mask:
    enabled: true
    top_ratio: 0.08
    bottom_ratio: 0.18
    left_ratio: 0.0
    right_ratio: 0.0
    position_mode: fixed
    fill_mode: median
  detector:
    name: none
    device: cpu
training:
  device: auto
  backbone: efficientnet_b0
  pretrained: true
  dropout: 0.4
  input_representation: fft_phase
  grad_clip_norm: 1.0
  batch_size: 32
  num_workers: 2
  epochs: 12
  lr: 0.0001
  weight_decay: 0.0005
  amp: true
  monitor: f1
  loss:
    label_smoothing: 0.05
    use_class_weights: true
  sampling:
    balanced_sampler: true
  early_stopping:
    patience: 4
    min_delta: 0.001
  augmentation:
    hflip_p: 0.5
    color_jitter: false
    random_erasing: true
    random_erasing_p: 0.20
inference:
  batch_size: 32
  aggregation: confidence_mean
  input_representation: fft_phase
  min_confidence: 0.55
  topk_ratio: 0.5
  conf_power: 2.0
evaluation:
  video_aggregation: confidence_mean
  input_representation: fft_phase
  topk_ratio: 0.5
  conf_power: 2.0
